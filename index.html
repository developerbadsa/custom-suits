<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SUITSUPPLY – Custom Made</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;color:#111827;-webkit-font-smoothing:antialiased}
button,input{font:inherit;border:none;background:none;cursor:pointer}
img{display:block}

/* ─── TOP BAR ─── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  background:#fff;padding:0 20px;height:56px;
  border-bottom:1px solid #e5e7eb;
  position:relative;z-index:10;
}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-center{position:absolute;left:50%;transform:translateX(-50%);font-size:15px;font-weight:800;letter-spacing:3px}
.topbar-right{display:flex;align-items:center;gap:6px}
.icon-btn{width:34px;height:34px;border-radius:50%;border:1px solid #e5e7eb;display:flex;align-items:center;justify-content:center;color:#374151;transition:border-color .15s}
.icon-btn:hover{border-color:#9ca3af}
.icon-btn svg{width:17px;height:17px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.finish-btn{
  height:34px;padding:0 18px;border-radius:20px;font-size:13px;font-weight:600;
  border:1px solid #d1d5db;color:#111827;transition:all .15s;
  display:flex;align-items:center;gap:6px;margin-right:6px;
}
.finish-btn.dark{background:#111827;color:#fff;border-color:#111827}
.finish-btn:hover{border-color:#9ca3af}
.finish-btn.dark:hover{background:#1f2937}

/* ─── PRICE DISPLAY (top-left below icons) ─── */
.price-wrap{display:flex;flex-direction:column;line-height:1.2}
.price-total{font-size:14px;font-weight:700}
.price-delivery{font-size:12px;color:#6b7280;margin-top:1px}

/* ─── SHELL ─── */
.shell{display:flex;height:calc(100vh - 56px);overflow:hidden}

/* ─── PREVIEW / STAGE ─── */
.stage{
  flex:1;position:relative;background:#f5f5f5;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.stage-bg{position:absolute;inset:0;background:#f0f0f0}
.preview-wrap{
  position:relative;display:flex;align-items:center;justify-content:center;
  height:100%;width:100%;
}
.preview-img{
  max-height:88%;max-width:70%;object-fit:contain;
  filter:drop-shadow(0 8px 40px rgba(0,0,0,.15));
  user-select:none;-webkit-user-drag:none;
  transition:opacity .25s;
}
.preview-img.fading{opacity:0}

/* nav arrows */
.nav-arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.9);border:1px solid #e0e0e0;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  transition:opacity .2s;z-index:2;
}
.nav-arrow svg{width:16px;height:16px;stroke:#374151;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.nav-arrow.left{left:16px}
.nav-arrow.right{right:16px}
.nav-arrow[hidden]{display:none}

/* dots */
.dots-row{
  position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;align-items:center;
}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(0,0,0,.18);cursor:pointer;transition:background .2s}
.dot.active{background:rgba(0,0,0,.65)}

/* wearing thumbnail */
.wearing-thumb{
  position:absolute;bottom:12px;right:12px;
  width:72px;height:84px;border-radius:10px;overflow:hidden;
  background:#e8e8e8;border:1px solid rgba(0,0,0,.12);
  cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.15);
  transition:transform .2s;
}
.wearing-thumb:hover{transform:scale(1.04)}
.wearing-thumb img{width:100%;height:100%;object-fit:cover}

/* spinner */
.spinner-overlay{
  position:absolute;top:16px;left:16px;
  width:18px;height:18px;
  border:2px solid rgba(0,0,0,.12);border-top-color:rgba(0,0,0,.45);
  border-radius:50%;animation:spin .8s linear infinite;
  display:none;
}
@keyframes spin{to{transform:rotate(360deg)}}
.stage.loading .spinner-overlay{display:block}

/* ─── SIDEBAR ─── */
.sidebar{
  width:310px;min-width:310px;
  background:#fff;border-left:1px solid #e8e8e8;
  display:flex;flex-direction:column;overflow:hidden;
}

/* tabs */
.tab-row{
  display:flex;padding:12px 14px 0;gap:2px;
  border-bottom:1px solid #f0f0f0;
}
.tab{
  padding:9px 14px;border-radius:20px;font-size:13.5px;font-weight:500;
  color:#6b7280;border:1px solid transparent;
  transition:all .15s;white-space:nowrap;
}
.tab.active{
  background:#111827;color:#fff;border-color:#111827;font-weight:600;
}
.tab:not(.active):hover{background:#f3f4f6;color:#111827}

/* search+filter row */
.search-row{
  display:flex;align-items:center;gap:8px;
  padding:10px 12px;border-bottom:1px solid #f0f0f0;
}
.search-box{
  flex:1;display:flex;align-items:center;gap:8px;
  border:1px solid #e5e7eb;border-radius:20px;padding:7px 12px;
  background:#fff;
}
.search-box svg{width:14px;height:14px;stroke:#9ca3af;stroke-width:2;fill:none;flex-shrink:0;stroke-linecap:round;stroke-linejoin:round}
.search-box input{border:0;outline:0;font-size:13px;color:#374151;width:100%;background:transparent}
.search-box input::placeholder{color:#9ca3af}
.filter-btn-pill{
  display:flex;align-items:center;gap:6px;
  border:1px solid #e5e7eb;border-radius:20px;padding:7px 13px;
  font-size:13px;color:#374151;white-space:nowrap;transition:border-color .15s;
}
.filter-btn-pill:hover{border-color:#9ca3af}
.filter-btn-pill svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}
.filter-badge{
  background:#111827;color:#fff;font-size:11px;font-weight:700;
  width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;
}
.filter-badge[hidden]{display:none}

/* fabric list */
.fabric-list{overflow-y:auto;flex:1;padding:8px 10px 16px}
.fabric-item{
  display:grid;grid-template-columns:72px 1fr 22px;align-items:center;gap:12px;
  padding:11px 10px 11px 10px;border-radius:14px;border:1.5px solid #ebebeb;
  background:#fff;cursor:pointer;margin-bottom:8px;
  transition:border-color .15s,box-shadow .15s;
}
.fabric-item:hover{border-color:#c0c0c0}
.fabric-item.selected{border-color:#111827;border-width:2px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.swatch-img{
  width:72px;height:72px;border-radius:10px;overflow:hidden;position:relative;
  border:1px solid rgba(0,0,0,.08);background:#1a1a1a;flex-shrink:0;
}
.swatch-img img{width:100%;height:100%;object-fit:cover}
.swatch-info-btn{
  position:absolute;bottom:5px;left:5px;width:20px;height:20px;
  border-radius:50%;background:rgba(255,255,255,.9);border:1px solid rgba(0,0,0,.15);
  display:flex;align-items:center;justify-content:center;font-size:11px;color:#374151;font-style:italic;font-weight:600;
}
.fabric-meta{min-width:0}
.fabric-name{font-size:13.5px;font-weight:600;line-height:1.3;color:#111827;margin-bottom:3px}
.fabric-price{font-size:12.5px;color:#6b7280}
.item-chev{color:#c0c0c0;font-size:18px;line-height:1;text-align:right}

/* ─── JACKET / TROUSERS CONFIG ROWS ─── */
.config-list{overflow-y:auto;flex:1;padding:10px 12px 16px}
.style-card{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;border-radius:14px;border:1px solid #ebebeb;
  background:#fff;margin-bottom:10px;
}
.style-left{display:flex;align-items:center;gap:10px}
.style-icon{
  width:36px;height:36px;border-radius:10px;background:#f3f4f6;
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
.style-label{font-size:11px;color:#9ca3af;font-weight:600;margin-bottom:2px}
.style-name{font-size:14px;font-weight:700}
.pencil-btn{
  width:32px;height:32px;border-radius:50%;border:1px solid #e5e7eb;
  display:flex;align-items:center;justify-content:center;
}
.pencil-btn svg{width:14px;height:14px;stroke:#374151;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.config-row{
  display:grid;grid-template-columns:80px 1fr 18px;align-items:center;gap:12px;
  padding:10px 12px;border-radius:14px;border:1px solid #ebebeb;
  background:#fff;cursor:pointer;margin-bottom:8px;
  transition:border-color .15s;
}
.config-row:hover{border-color:#c0c0c0}
.config-thumb{width:80px;height:80px;border-radius:10px;overflow:hidden;background:#f3f4f6;border:1px solid #ebebeb;flex-shrink:0}
.config-thumb img{width:100%;height:100%;object-fit:cover}
.config-label{font-size:13px;font-weight:700;color:#111827;margin-bottom:3px}
.config-val{font-size:12.5px;color:#6b7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.config-chev{color:#c0c0c0;font-size:16px;text-align:right}

/* ─── FILTER PANEL ─── */
.filter-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100;
  display:none;
}
.filter-overlay.open{display:block}
.filter-panel{
  position:fixed;top:0;bottom:0;left:0;width:360px;max-width:100%;
  background:#fff;z-index:101;
  display:flex;flex-direction:column;overflow:hidden;
  transform:translateX(-100%);transition:transform .25s ease;
}
.filter-overlay.open .filter-panel{transform:translateX(0)}
.filter-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px;border-bottom:1px solid #f0f0f0;
}
.filter-title{font-size:16px;font-weight:700}
.filter-actions{display:flex;align-items:center;gap:10px}
.clear-all-btn{font-size:13px;color:#6b7280;padding:6px 10px;border-radius:8px;transition:background .15s}
.clear-all-btn:hover{background:#f3f4f6;color:#111827}
.close-btn{
  width:32px;height:32px;border-radius:50%;border:1px solid #e5e7eb;
  display:flex;align-items:center;justify-content:center;
}
.close-btn svg{width:14px;height:14px;stroke:#374151;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.filter-body{overflow-y:auto;flex:1;padding:4px 0 16px}

/* filter groups */
.fgroup{border-bottom:1px solid #f3f4f6}
.fgroup-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;cursor:pointer;user-select:none;
}
.fgroup-head-label{font-size:14px;font-weight:700;color:#111827}
.fgroup-toggle{font-size:18px;color:#6b7280;font-weight:300;line-height:1}
.fgroup-body{padding:0 18px 14px}
.fgroup.collapsed .fgroup-body{display:none}

/* sort radios */
.sort-opt{display:flex;align-items:center;gap:10px;padding:6px 2px;cursor:pointer}
.sort-opt input{accent-color:#111827;width:16px;height:16px;cursor:pointer}
.sort-opt span{font-size:13.5px;color:#374151}

/* color swatches grid */
.color-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px;padding:4px 0}
.color-swatch{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;padding:4px 2px}
.color-swatch input{position:absolute;opacity:0;width:0;height:0}
.color-dot{width:22px;height:22px;border-radius:5px;border:1px solid rgba(0,0,0,.12);flex-shrink:0}
.color-name{font-size:13px;color:#374151}

/* checkbox opts */
.check-opt{display:flex;align-items:center;gap:10px;padding:6px 2px;cursor:pointer}
.check-opt input{accent-color:#111827;width:15px;height:15px;cursor:pointer}
.check-opt span{font-size:13.5px;color:#374151}
.check-indent{padding-left:20px}
.view-more-btn{font-size:12.5px;color:#6b7280;padding:4px 2px;display:flex;align-items:center;gap:4px;margin-top:2px}
.view-more-btn:hover{color:#111827}

/* ─── INFO DIALOG ─── */
.info-dialog-wrap{
  position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;
  display:none;align-items:center;justify-content:center;
}
.info-dialog-wrap.open{display:flex}
.info-dialog{
  background:#fff;border-radius:16px;padding:20px 22px 18px;
  max-width:440px;width:calc(100% - 28px);
  box-shadow:0 20px 60px rgba(0,0,0,.2);
  border:1px solid rgba(0,0,0,.08);
}
.info-dialog h3{font-size:17px;font-weight:700;margin-bottom:8px}
.info-dialog p{font-size:14px;color:#6b7280;line-height:1.6;margin-bottom:16px}
.info-dialog-footer{display:flex;justify-content:flex-end}
.dlg-close-btn{padding:9px 22px;border-radius:20px;border:1px solid #e5e7eb;font-size:13.5px;font-weight:600;color:#374151;transition:border-color .15s}
.dlg-close-btn:hover{border-color:#9ca3af}

/* ─── SUMMARY PAGE ─── */
.summary-page{
  flex:1;overflow-y:auto;background:#f5f5f5;
}
.summary-inner{padding:24px 24px 40px;max-width:1100px;margin:0 auto}
.summary-title{font-size:28px;font-weight:800;text-align:center;margin-bottom:24px;letter-spacing:-.3px}
.summary-grid{display:grid;grid-template-columns:1fr 380px;gap:16px}
.sum-preview{
  background:#ebebeb;border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  min-height:500px;position:relative;overflow:hidden;
}
.sum-preview img{max-height:90%;max-width:80%;object-fit:contain;filter:drop-shadow(0 8px 30px rgba(0,0,0,.15))}
.sum-panel{
  background:#fff;border:1px solid #ebebeb;border-radius:20px;
  padding:18px;display:flex;flex-direction:column;
}
.sum-section-head{
  display:flex;align-items:center;justify-content:space-between;
  padding-bottom:12px;border-bottom:1px solid #f0f0f0;margin-bottom:12px;
}
.sum-section-head h3{font-size:15px;font-weight:800}
.sum-items{display:flex;flex-direction:column;gap:8px;flex:1}
.sum-item{
  display:grid;grid-template-columns:54px 1fr;gap:10px;align-items:center;
  padding:10px;border-radius:12px;background:#fafafa;border:1px solid #f0f0f0;
}
.sum-item-thumb{width:54px;height:54px;border-radius:10px;overflow:hidden;background:#e8e8e8;border:1px solid #ebebeb;flex-shrink:0}
.sum-item-thumb img{width:100%;height:100%;object-fit:cover}
.sum-item-label{font-size:13px;font-weight:700;margin-bottom:2px}
.sum-item-val{font-size:12px;color:#6b7280}
.sum-footer{
  border-top:1px solid #f0f0f0;margin-top:14px;padding-top:14px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
}
.sum-totals{display:flex;gap:28px}
.sum-total-block .k{font-size:11px;color:#9ca3af;font-weight:600;margin-bottom:2px}
.sum-total-block .v{font-size:16px;font-weight:800}
.sum-actions{display:flex;align-items:center;gap:8px}
.btn-outline{padding:10px 18px;border-radius:10px;border:1px solid #d1d5db;font-size:13.5px;font-weight:600;color:#374151;transition:border-color .15s}
.btn-outline:hover{border-color:#9ca3af}
.btn-dark{padding:10px 20px;border-radius:10px;background:#111827;color:#fff;font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:6px}
.btn-dark svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* fabric swatch canvas texture */
.swatch-canvas{width:100%;height:100%;display:block}

@media(max-width:900px){
  .sidebar{width:100%;min-width:0}
  .shell{flex-direction:column}
  .stage{min-height:300px;flex:0 0 300px}
  .summary-grid{grid-template-columns:1fr}
  .filter-panel{width:100%}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-left">
    <button class="icon-btn" title="Menu" aria-label="Menu">
      <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <button class="icon-btn" title="Search" aria-label="Search">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
    </button>
    <div class="price-wrap" id="priceWrap">
      <div class="price-total" id="priceTotal">Total $1133</div>
      <div class="price-delivery">2–3 week delivery</div>
    </div>
  </div>

  <div class="topbar-center">SUITSUPPLY</div>

  <div class="topbar-right">
    <button class="finish-btn" id="finishBtn" onclick="goSummary()">Finish</button>
    <button class="icon-btn" title="Account"><svg viewBox="0 0 24 24"><path d="M20 21a8 8 0 1 0-16 0"/><circle cx="12" cy="9" r="4"/></svg></button>
    <button class="icon-btn" title="Wishlist"><svg viewBox="0 0 24 24"><path d="M19 21l-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></button>
    <button class="icon-btn" title="Bag"><svg viewBox="0 0 24 24"><path d="M6 7h12l-1.5 13h-9L6 7Z"/><path d="M9 7a3 3 0 0 1 6 0"/></svg></button>
  </div>
</header>

<!-- MAIN SHELL -->
<div class="shell" id="mainShell">

  <!-- STAGE -->
  <div class="stage" id="stage">
    <div class="spinner-overlay" id="spinner"></div>

    <div class="preview-wrap">
      <img class="preview-img" id="previewImg" src="" alt="Suit preview" onerror="this.src=getFallbackSVG()"/>
    </div>

    <button class="nav-arrow left" id="prevBtn" aria-label="Previous" onclick="changeSlide(-1)">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="nav-arrow right" id="nextBtn" aria-label="Next" onclick="changeSlide(1)">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>

    <div class="dots-row" id="dotsRow"></div>

    <button class="wearing-thumb" id="wearingThumb" onclick="toggleWearing()" title="Toggle wearing view">
      <img id="wearThumbImg" src="" alt="Wearing view" onerror="this.src=getWearingFallback()"/>
    </button>
  </div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <!-- TABS -->
    <div class="tab-row">
      <button class="tab" id="tab-fabric" onclick="switchSection('fabric')">Fabric</button>
      <button class="tab" id="tab-jacket" onclick="switchSection('jacket')">Jacket</button>
      <button class="tab" id="tab-trousers" onclick="switchSection('trousers')">Trousers</button>
      <button class="tab" id="tab-waistcoat" onclick="switchSection('waistcoat')">Waistcoat</button>
    </div>

    <!-- SEARCH + FILTER (fabric only) -->
    <div class="search-row" id="searchRow">
      <div class="search-box">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
        <input type="search" id="searchInput" placeholder="Search" autocomplete="off" oninput="onSearch()"/>
      </div>
      <button class="filter-btn-pill" onclick="openFilter()">
        <svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
        <span>Filter</span>
        <span class="filter-badge" id="filterBadge" hidden>0</span>
      </button>
    </div>

    <!-- CONTENT AREA -->
    <div class="fabric-list" id="fabricList"></div>
    <div class="config-list" id="configList" style="display:none"></div>
  </aside>
</div>

<!-- SUMMARY PAGE -->
<div id="summaryPage" style="display:none">
  <div class="summary-page">
    <div class="summary-inner">
      <div class="summary-title">Your custom suit summary</div>
      <div class="summary-grid">
        <div class="sum-preview" id="sumPreview">
          <img id="sumPreviewImg" src="" alt="Summary preview"/>
        </div>
        <div class="sum-panel">
          <div class="sum-section-head">
            <h3>Jacket</h3>
            <button class="pencil-btn" onclick="switchSection('jacket');showConfigurator()">
              <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
          </div>
          <div class="sum-items" id="sumItems"></div>
          <div class="sum-footer">
            <div class="sum-totals">
              <div class="sum-total-block">
                <div class="k">Total</div>
                <div class="v" id="sumTotal">$1133</div>
              </div>
              <div class="sum-total-block">
                <div class="k">Delivery time</div>
                <div class="v" style="font-size:14px">2–3 weeks</div>
              </div>
            </div>
            <div class="sum-actions">
              <button class="icon-btn"><svg viewBox="0 0 24 24" style="width:16px;height:16px"><path d="M19 21l-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" stroke="#374151" fill="none" stroke-width="1.8"/></svg></button>

function makeFabricSwatch(hex, design) {
  const d = design || "Plain";
  let pattern = "";
  if (d === "Herringbone") {
    pattern = `<pattern id="pat" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="${hex}"/>
      <rect x="0" y="0" width="3" height="8" fill="rgba(255,255,255,.06)"/>
    </pattern>`;
  } else if (d === "Stripe") {
    pattern = `<pattern id="pat" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(15)">
      <rect width="6" height="6" fill="${hex}"/>
      <rect x="0" y="0" width="1.5" height="6" fill="rgba(255,255,255,.18)"/>
    </pattern>`;
  } else if (d === "Houndstooth") {
    pattern = `<pattern id="pat" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="${hex}"/>
      <rect x="0" y="0" width="5" height="5" fill="rgba(255,255,255,.12)"/>
      <rect x="5" y="5" width="5" height="5" fill="rgba(255,255,255,.12)"/>
    </pattern>`;
  } else {
    pattern = `<pattern id="pat" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <rect width="4" height="4" fill="${hex}"/>
      <rect x="0" y="0" width="1" height="4" fill="rgba(255,255,255,.04)"/>
    </pattern>`;
  }
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 72 72">
    <defs>${pattern}</defs>
    <rect width="72" height="72" rx="10" fill="url(#pat)"/>
    <rect width="72" height="72" rx="10" fill="rgba(0,0,0,.08)"/>
  </svg>`;
  return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
}

function getSelectedFabric() {
  return FABRICS.find(f => f.id === state.selectedId) || FABRICS[0];
}
function money(n) { return "$" + Math.round(n || 0).toLocaleString(); }

// ─── RENDERING ───────────────────────────────────────────────────────────────
function renderAll() {
  renderTopBar();
  renderTabs();
  renderPreview();

  if (state.section === "summary") {
    document.getElementById("mainShell").style.display = "none";
    document.getElementById("summaryPage").style.display = "block";
    renderSummary();
  } else {
    document.getElementById("mainShell").style.display = "flex";
    document.getElementById("summaryPage").style.display = "none";
    renderSideContent();
  }
}

function renderTopBar() {
  const f = getSelectedFabric();
  document.getElementById("priceTotal").textContent = "Total " + money(f.price);
  const fb = document.getElementById("finishBtn");
  if (state.section === "jacket" || state.section === "trousers") {
    fb.classList.add("dark");
  } else {
    fb.classList.remove("dark");
  }
}

function renderTabs() {
  ["fabric","jacket","trousers","waistcoat"].forEach(s => {
    const t = document.getElementById("tab-"+s);
    if (t) t.classList.toggle("active", s === state.section);
  });
}

function renderPreview() {
  const f = getSelectedFabric();
  const img = document.getElementById("previewImg");
  const wearImg = document.getElementById("wearThumbImg");

  // Determine what to show based on slide
  let src;
  if (state.wearing) {
    src = makeWearingSVG(f.hex);
    // Try user-provided image
    src = USER_IMGS[0] || src;
  } else {
    if (state.section === "trousers") {
      src = makeTrouserSVG(f.hex);
    } else {
      src = makePreviewSVG(f.hex, "");
    }
    // For slide 0 on fabric/jacket section, try user images
    if ((state.section === "fabric" || state.section === "jacket") && state.slide < USER_IMGS.length) {
      src = USER_IMGS[state.slide] || src;
    }
  }

  // Fade transition
  img.classList.add("fading");
  setTimeout(() => {
    img.src = src;
    img.classList.remove("fading");
  }, 120);

  // Wearing thumb
  wearImg.src = makeWearingSVG(f.hex);
  if (!state.wearing && USER_IMGS[0]) wearImg.src = USER_IMGS[0];

  // Dots
  const totalSlides = state.totalSlides;
  const dotsRow = document.getElementById("dotsRow");
  dotsRow.innerHTML = "";
  for (let i = 0; i < totalSlides; i++) {
    const d = document.createElement("span");
    d.className = "dot" + (i === state.slide ? " active" : "");
    d.onclick = () => { state.slide = i; state.wearing = false; renderPreview(); };
    dotsRow.appendChild(d);
  }

  // Hide arrows if only 1 slide
  document.getElementById("prevBtn").hidden = totalSlides <= 1;
  document.getElementById("nextBtn").hidden = totalSlides <= 1;
}

function renderSideContent() {
  const isFabric = state.section === "fabric";
  const isConfig = state.section === "jacket" || state.section === "trousers" || state.section === "waistcoat";

  document.getElementById("searchRow").style.display = isFabric ? "flex" : "none";
  document.getElementById("fabricList").style.display = isFabric ? "flex" : "none";
  document.getElementById("configList").style.display = isConfig ? "block" : "none";

  if (isFabric) {
    document.getElementById("fabricList").style.flexDirection = "column";
    renderFabricList();
  } else if (isConfig) {
    renderConfigList();
  }
}

function applyFilters(list) {
  let out = list;
  const q = state.q.trim().toLowerCase();
  if (q) out = out.filter(f => f.name.toLowerCase().includes(q));
  if (state.filters.colors.size) out = out.filter(f => state.filters.colors.has(f.colorKey));
  if (state.filters.seasons.size) out = out.filter(f => state.filters.seasons.has(f.season));
  if (state.filters.designs.size) out = out.filter(f => state.filters.designs.has(f.design));
  if (state.filters.materials.size) out = out.filter(f => f.materials.some(m => state.filters.materials.has(m)));
  if (state.filters.mills.size) out = out.filter(f => state.filters.mills.has(f.mill));
  const sort = state.filters.sort;
  if (sort === "newest") out = [...out].reverse();
  else if (sort === "priceHigh") out = [...out].sort((a,b) => b.price - a.price);
  else if (sort === "priceLow") out = [...out].sort((a,b) => a.price - b.price);
  return out;
}

function renderFabricList() {
  const list = applyFilters(FABRICS);
  const wrap = document.getElementById("fabricList");
  wrap.innerHTML = "";

  list.forEach(f => {
    const item = document.createElement("div");
    item.className = "fabric-item" + (f.id === state.selectedId ? " selected" : "");

    // swatch
    const swDiv = document.createElement("div");
    swDiv.className = "swatch-img";
    const swImg = document.createElement("img");
    swImg.src = makeFabricSwatch(f.hex, f.design);
    swImg.alt = f.name;
    swDiv.appendChild(swImg);

    // info btn (only on selected)
    if (f.id === state.selectedId) {
      const ib = document.createElement("button");
      ib.className = "swatch-info-btn";
      ib.title = "Fabric info";
      ib.textContent = "i";
      ib.onclick = (e) => { e.stopPropagation(); openInfo(f); };
      swDiv.appendChild(ib);
    }

    // meta
    const meta = document.createElement("div");
    meta.className = "fabric-meta";
    const nm = document.createElement("div");
    nm.className = "fabric-name";
    nm.textContent = f.name;
    const pr = document.createElement("div");
    pr.className = "fabric-price";
    pr.textContent = money(f.price);
    meta.appendChild(nm);
    meta.appendChild(pr);

    const chev = document.createElement("div");
    chev.className = "item-chev";
    chev.innerHTML = "›";

    item.appendChild(swDiv);
    item.appendChild(meta);
    item.appendChild(chev);

    item.onclick = () => {
      state.selectedId = f.id;
      state.wearing = false;
      state.slide = 0;
      renderAll();
    };

    wrap.appendChild(item);
  });
}

function renderConfigList() {
  const wrap = document.getElementById("configList");
  wrap.innerHTML = "";
  const f = getSelectedFabric();

  const data = state.section === "trousers" ? state.trousers : state.jacket;
  const sec = state.section === "trousers" ? state.trousers : state.jacket;

  // Style card
  const styleCard = document.createElement("div");
  styleCard.className = "style-card";
  styleCard.innerHTML = `
    <div class="style-left">
      <div class="style-icon">🧵</div>
      <div>
        <div class="style-label">Your Style</div>
        <div class="style-name">${sec.style}</div>
      </div>
    </div>
    <button class="pencil-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
    </button>
  `;
  wrap.appendChild(styleCard);

  sec.items.forEach(it => {
    const row = document.createElement("div");
    row.className = "config-row";

    const thumb = document.createElement("div");
    thumb.className = "config-thumb";
    const tImg = document.createElement("img");
    tImg.src = makeConfigThumb(f.hex, it.thumb);
    tImg.alt = it.k;
    thumb.appendChild(tImg);

    const metaDiv = document.createElement("div");
    const label = document.createElement("div");
    label.className = "config-label";
    label.textContent = it.k;
    const val = document.createElement("div");
    val.className = "config-val";
    val.textContent = it.v || "–";
    metaDiv.appendChild(label);
    metaDiv.appendChild(val);

    const chev = document.createElement("div");
    chev.className = "config-chev";
    chev.innerHTML = "›";

    row.appendChild(thumb);
    row.appendChild(metaDiv);
    row.appendChild(chev);
    wrap.appendChild(row);
  });
}

function renderSummary() {
  const f = getSelectedFabric();
  document.getElementById("sumTotal").textContent = money(f.price);
  document.getElementById("sumPreviewImg").src = makePreviewSVG(f.hex, "");

  if (USER_IMGS[0]) {
    const img = document.getElementById("sumPreviewImg");
    img.src = USER_IMGS[0];
    img.onerror = () => { img.src = makePreviewSVG(f.hex, ""); };
  }

  const wrap = document.getElementById("sumItems");
  wrap.innerHTML = "";
  state.jacket.items.slice(0, 4).forEach(it => {
    const item = document.createElement("div");
    item.className = "sum-item";
    const thumb = document.createElement("div");
    thumb.className = "sum-item-thumb";
    const img = document.createElement("img");
    img.src = makeConfigThumb(f.hex, it.thumb);
    img.alt = it.k;
    thumb.appendChild(img);
    const meta = document.createElement("div");
    meta.innerHTML = `<div class="sum-item-label">${it.k}</div><div class="sum-item-val">${it.v || "–"}</div>`;
    item.appendChild(thumb);
    item.appendChild(meta);
    wrap.appendChild(item);
  });
}

// ─── FILTER PANEL ────────────────────────────────────────────────────────────
function renderFilterPanel() {
  const body = document.getElementById("filterBody");
  body.innerHTML = "";

  // Sort
  body.appendChild(makeGroup("Sort by", makeSortUI()));
  // Color
  body.appendChild(makeGroup("Color", makeColorUI()));
  // Season
  body.appendChild(makeGroup("Season", makeCheckUI(SEASONS, state.filters.seasons)));
  // Design
  body.appendChild(makeGroup("Design", makeCheckUI(DESIGNS, state.filters.designs)));
  // Material
  body.appendChild(makeGroup("Material", makeMaterialUI()));
  // Mill
  body.appendChild(makeGroup("Mill", makeCheckUI(MILLS, state.filters.mills)));
}

function makeGroup(title, content) {
  const g = document.createElement("div");
  g.className = "fgroup";
  const head = document.createElement("div");
  head.className = "fgroup-head";
  head.innerHTML = `<span class="fgroup-head-label">${title}</span><span class="fgroup-toggle">–</span>`;
  head.onclick = () => {
    g.classList.toggle("collapsed");
    head.querySelector(".fgroup-toggle").textContent = g.classList.contains("collapsed") ? "+" : "–";
  };
  const bd = document.createElement("div");
  bd.className = "fgroup-body";
  bd.appendChild(content);
  g.appendChild(head);
  g.appendChild(bd);
  return g;
}

function makeSortUI() {
  const wrap = document.createElement("div");
  const opts = [{k:"default",l:"Default"},{k:"newest",l:"Newest"},{k:"priceHigh",l:"Price: High – Low"},{k:"priceLow",l:"Price: Low – High"}];
  opts.forEach(o => {
    const lab = document.createElement("label");
    lab.className = "sort-opt";
    const inp = document.createElement("input");
    inp.type = "radio"; inp.name = "fsort"; inp.value = o.k;
    inp.checked = state.filters.sort === o.k;
    inp.onchange = () => { state.filters.sort = o.k; updateFabricList(); };
    const sp = document.createElement("span"); sp.textContent = o.l;
    lab.appendChild(inp); lab.appendChild(sp);
    wrap.appendChild(lab);
  });
  return wrap;
}

function makeColorUI() {
  const wrap = document.createElement("div");
  wrap.className = "color-grid";
  COLORS.forEach(c => {
    const lab = document.createElement("label");
    lab.className = "color-swatch";
    const inp = document.createElement("input");
    inp.type = "checkbox"; inp.value = c.k;
    inp.checked = state.filters.colors.has(c.k);
    inp.onchange = () => {
      if (inp.checked) state.filters.colors.add(c.k); else state.filters.colors.delete(c.k);
      updateFabricList(); updateFilterBadge();
    };
    const dot = document.createElement("span");
    dot.className = "color-dot"; dot.style.background = c.hex;
    const nm = document.createElement("span");
    nm.className = "color-name"; nm.textContent = c.k;
    lab.appendChild(inp); lab.appendChild(dot); lab.appendChild(nm);
    wrap.appendChild(lab);
  });
  return wrap;
}

function makeCheckUI(items, set) {
  const wrap = document.createElement("div");
  items.forEach(s => {
    const lab = document.createElement("label");
    lab.className = "check-opt";
    const inp = document.createElement("input");
    inp.type = "checkbox"; inp.value = s;
    inp.checked = set.has(s);
    inp.onchange = () => {
      if (inp.checked) set.add(s); else set.delete(s);
      updateFabricList(); updateFilterBadge();
    };
    const sp = document.createElement("span"); sp.textContent = s;
    lab.appendChild(inp); lab.appendChild(sp);
    wrap.appendChild(lab);
  });
  return wrap;
}

function makeMaterialUI() {
  const wrap = document.createElement("div");
  MATERIAL_TREE.forEach(node => {
    const parentLab = document.createElement("label");
    parentLab.className = "check-opt";
    const parentInp = document.createElement("input");
    parentInp.type = "checkbox"; parentInp.value = node.k;
    parentInp.checked = state.filters.materials.has(node.k);
    parentInp.onchange = () => {
      if (parentInp.checked) state.filters.materials.add(node.k); else state.filters.materials.delete(node.k);
      updateFabricList(); updateFilterBadge();
    };
    const pSp = document.createElement("span"); pSp.textContent = node.k;
    parentLab.appendChild(parentInp); parentLab.appendChild(pSp);
    wrap.appendChild(parentLab);

    const childWrap = document.createElement("div");
    childWrap.className = "check-indent";
    childWrap.style.display = "none";
    node.subs.forEach(s => {
      const lab = document.createElement("label");
      lab.className = "check-opt";
      const inp = document.createElement("input");
      inp.type = "checkbox"; inp.value = s;
      inp.checked = state.filters.materials.has(s);
      inp.onchange = () => {
        if (inp.checked) state.filters.materials.add(s); else state.filters.materials.delete(s);
        updateFabricList(); updateFilterBadge();
      };
      const sp = document.createElement("span"); sp.textContent = s;
      lab.appendChild(inp); lab.appendChild(sp);
      childWrap.appendChild(lab);
    });

    const vm = document.createElement("button");
    vm.className = "view-more-btn";
    vm.textContent = "View more ›";
    vm.onclick = () => {
      const open = childWrap.style.display !== "none";
      childWrap.style.display = open ? "none" : "block";
      vm.textContent = open ? "View more ›" : "View less ‹";
    };
    wrap.appendChild(vm);
    wrap.appendChild(childWrap);
  });
  return wrap;
}

function updateFabricList() {
  if (state.section === "fabric") renderFabricList();
}

function updateFilterBadge() {
  let c = state.filters.colors.size + state.filters.seasons.size +
          state.filters.designs.size + state.filters.materials.size + state.filters.mills.size;
  const badge = document.getElementById("filterBadge");
  badge.hidden = c === 0;
  badge.textContent = c;
}

function openFilter() {
  renderFilterPanel();
  document.getElementById("filterOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeFilter() {
  document.getElementById("filterOverlay").classList.remove("open");
  document.body.style.overflow = "";
}
function onOverlayClick(e) {
  if (e.target === document.getElementById("filterOverlay")) closeFilter();
}
function clearFilters() {
  state.filters = {sort:"default", colors:new Set(), seasons:new Set(), designs:new Set(), materials:new Set(), mills:new Set()};
  renderFilterPanel();
  updateFabricList();
  updateFilterBadge();
}

// ─── INFO DIALOG ─────────────────────────────────────────────────────────────
function openInfo(f) {
  document.getElementById("infoTitle").textContent = f.name;
  document.getElementById("infoBody").textContent =
    `Season: ${f.season} · Design: ${f.design} · Materials: ${f.materials.join(", ")} · Mill: ${f.mill}`;
  document.getElementById("infoDialogWrap").classList.add("open");
}
function closeInfo() {
  document.getElementById("infoDialogWrap").classList.remove("open");
}
function onInfoOverlayClick(e) {
  if (e.target === document.getElementById("infoDialogWrap")) closeInfo();
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
function switchSection(sec) {
  state.section = sec;
  state.slide = 0;
  state.wearing = false;
  renderAll();
}

function goSummary() {
  state.section = "summary";
  renderAll();
}

function showConfigurator() {
  state.section = "fabric";
  renderAll();
}

function changeSlide(dir) {
  state.slide = (state.slide + dir + state.totalSlides) % state.totalSlides;
  state.wearing = false;
  renderPreview();
}

function toggleWearing() {
  state.wearing = !state.wearing;
  renderPreview();
}

function onSearch() {
  state.q = document.getElementById("searchInput").value || "";
  if (state.section === "fabric") renderFabricList();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
(function init() {
  // Read section from URL
  const params = new URLSearchParams(location.search);
  const sec = params.get("section");
  if (sec && ["fabric","jacket","trousers","waistcoat","summary"].includes(sec)) {
    state.section = sec;
  }
  renderAll();
})();
</script>
</body>
